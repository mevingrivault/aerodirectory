services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aerodirectory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # SeaweedFS — S3-compatible object storage (Apache 2.0 license)
  # Master: coordinates the cluster
  seaweedfs-master:
    image: chrislusf/seaweedfs:latest
    command: master -ip=seaweedfs-master -ip.bind=0.0.0.0
    ports:
      - "9333:9333"   # Master HTTP
      - "19333:19333" # Master gRPC
    volumes:
      - seaweedfs_master:/data

  # Volume: stores actual file data
  seaweedfs-volume:
    image: chrislusf/seaweedfs:latest
    command: volume -mserver=seaweedfs-master:9333 -ip.bind=0.0.0.0 -port=8080
    ports:
      - "8082:8080"   # Volume HTTP
    depends_on:
      - seaweedfs-master
    volumes:
      - seaweedfs_volume:/data

  # Filer + S3 gateway: provides S3-compatible API
  seaweedfs-filer:
    image: chrislusf/seaweedfs:latest
    command: filer -master=seaweedfs-master:9333 -ip.bind=0.0.0.0 -s3 -s3.port=8333
    ports:
      - "8888:8888"   # Filer HTTP
      - "8333:8333"   # S3 API
    depends_on:
      - seaweedfs-master
      - seaweedfs-volume
    volumes:
      - seaweedfs_filer:/data

  # pgAdmin — database GUI
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@aerodirectory.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  # Optional: email testing
  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
  seaweedfs_master:
  seaweedfs_volume:
  seaweedfs_filer:
